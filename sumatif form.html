<html>
<head>
<link rel="stylesheet" href="sumatif form.css">
<title> Choice Sederhana </title>
</head>
<body>

<div class="container">
    <h2> Form Pendaftaran </h2>

    <label> Nama:</label>
    <input type="text" id="nama" placeholder="Masukkan nama anda">

    <label> Kelas:</label>
    <input type="text" id="kelas" placeholder="Masukkan kelas anda">

    <label> Umur </label>
    <label>
        <input type="radio" name="Umur" value="10-12 tahun">10-12 tahun
    </label>
    <label>
        <input type="radio" name="Umur" value="13-15 tahun">13-15 tahun
    </label>
    <label>
        <input type="radio" name="Umur" value="16-17 tahun">16-17 tahun
    </label>

    <label> Jenis kelamin </label>
    <label>
        <input type="radio" name="gender" value="Laki-Laki">Laki-Laki
    </label>
    <label>
        <input type="radio" name="gender" value="Perempuan">Perempuan
    </label>

    <label> Tingkatan </label>
    <label>
        <input type="radio" name="tingkatan" value="SD">SD
    </label>
    <label>
        <input type="radio" name="tingkatan" value="SMP">SMP
    </label>
    <label>
        <input type="radio" name="tingkatan" value="SMA">SMA
    </label>

    <button type="button" id="okBTN">Ok</button>
    <button type="button" id="clearBTN">Clear</button>

    <div class="result" id="Hasil">
        Data Muncul di sini
    </div>
</div>

<script src="sumatif form.js"></script>
</body>
</html>
